name: CD Production Frontend

on:
  push:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  lint-and-build:
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      build_success: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build React
        id: build
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30

  release:
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup Git auth for semantic release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"

  build-and-scan-docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: arthurguill/pinball-playfield
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and Push Production
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          cache-from: type=registry,ref=arthurguill/pinball-playfield:buildcache
          cache-to: type=registry,ref=arthurguill/pinball-playfield:buildcache,mode=max

      - name: Wait for image propagation
        run: sleep 10

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: arthurguill/pinball-playfield:latest
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  notify-team:
    needs: [release, build-and-scan-docker]
    if: always() && needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: needs.build-and-scan-docker.result == 'success'
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \" **Frontend : Nouvelle Release v${{ needs.release.outputs.new_release_version }}**\n Build et scan Docker réussis\n Image: arthurguill/pinball-playfield:latest\n Triggered by @${{ github.actor }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify failure
        if: needs.build-and-scan-docker.result == 'failure'
        run: |
          REASON="Docker build"
          if [ "${{ needs.build-and-scan-docker.result }}" = "failure" ]; then
            REASON="security scan (Trivy) ou Docker build"
          fi
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \" **Frontend : Release v${{ needs.release.outputs.new_release_version }} - Échec**\n Erreur au niveau: ${REASON}\n Triggered by @${{ github.actor }}\n\n Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify no release
        if: needs.release.outputs.new_release_published != 'true'
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \" **Frontend : Push sur main**\n Aucune nouvelle release générée\n Triggered by @${{ github.actor }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
